      const computeFederalTax = (income) => {
        let taxable = Math.max(0, income);
        let tax = 0;
        let previousCap = 0;

        for (const bracket of taxBrackets2024) {
          if (taxable <= previousCap) break;
          const taxableAtBracket = Math.min(taxable, bracket.cap) - previousCap;
          if (taxableAtBracket > 0) {
            tax += taxableAtBracket * bracket.rate;
          }
          previousCap = bracket.cap;
        }

        if (taxable > taxBrackets2024[taxBrackets2024.length - 1].cap) {
          tax +=
            (taxable - taxBrackets2024[taxBrackets2024.length - 1].cap) *
            taxBrackets2024[taxBrackets2024.length - 1].rate;
        }

        return tax;
      };

          if (!active) return;
          let frame;
          const start = performance.now();
          const initial = 0;

          const run = (now) => {
            const progress = Math.min((now - start) / duration, 1);
            setDisplay(initial + (value - initial) * progress);
            if (progress < 1) {
              frame = requestAnimationFrame(run);
            }
          };

          frame = requestAnimationFrame(run);
          return () => cancelAnimationFrame(frame);
        }, [value, active, duration]);

        return display;

      const EditableValue = ({ value, onSave, formatter = (v) => v, inputClass = '', type = 'number' }) => {
        const [editing, setEditing] = useState(false);
        const [draft, setDraft] = useState(value);
        useEffect(() => setDraft(value), [value]);

        const commit = () => {
          const parsed = type === 'number' ? Number(draft) || 0 : draft;
          onSave(parsed);
          setEditing(false);
        };

        if (editing) {
          return (
            <input
              autoFocus
              value={draft}
              type={type === 'number' ? 'number' : 'text'}
              onChange={(e) => setDraft(e.target.value)}
              onBlur={commit}
              onKeyDown={(e) => {
                if (e.key === 'Enter') commit();
                if (e.key === 'Escape') setEditing(false);
              }}
              className={`rounded-lg border border-gold/50 bg-base px-2 py-1 text-white ${inputClass}`}
            />
          );
        }

        return (
          <button onClick={() => setEditing(true)} className="text-left hover:text-softgold">
            {formatter(value)}
          </button>
        );
      };

                              <td className="px-2 py-2"><InventoryEditableCell value={row.piece} onSave={(v) => updateInventoryRow(row.id, 'piece', v)} /></td>
                              <td className="px-2 py-2"><InventoryEditableCell value={row.category} onSave={(v) => updateInventoryRow(row.id, 'category', v)} options={['Painting', 'Print', 'Sculpture', 'Digital', 'Commission']} /></td>
                              <td className="px-2 py-2"><InventoryEditableCell value={row.status} onSave={(v) => updateInventoryRow(row.id, 'status', v)} options={['Available', 'Sold', 'Reserved', 'In Progress']} /></td>
                              <td className="px-2 py-2"><InventoryEditableCell value={row.price} type="number" onSave={(v) => updateInventoryRow(row.id, 'price', v)} /></td>
                              <td className="px-2 py-2"><InventoryEditableCell value={row.dateListed} onSave={(v) => updateInventoryRow(row.id, 'dateListed', v)} /></td>
                              <td className="px-2 py-2"><InventoryEditableCell value={row.platform} onSave={(v) => updateInventoryRow(row.id, 'platform', v)} /></td>
                              <td className="px-2 py-2"><InventoryEditableCell value={row.notes} onSave={(v) => updateInventoryRow(row.id, 'notes', v)} /></td>
                              <td className="px-2 py-2">
                                <button onClick={() => markAsSold(row.id)} className="rounded-md border border-success/40 px-2 py-1 text-xs text-success">Mark as Sold</button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>

                    <div className="grid gap-4 lg:grid-cols-2">
                      <div className="glass rounded-2xl p-4">
                        <p className="text-sm uppercase tracking-[0.12em] text-textsoft">Sold Pieces</p>
                        <div className="mt-2 space-y-2">
                          {dashboardData.inventoryRows.filter((r) => r.status === 'Sold').map((row) => (
                            <div key={row.id} className="flex items-center justify-between rounded-lg border border-success/25 bg-success/10 px-3 py-2">
                              <span>{row.piece}</span>
                              <span className="text-success">✓ Sold</span>
                            </div>
                          ))}
                        </div>
                      </div>
                      <div className="glass rounded-2xl p-4">
                        <p className="text-sm uppercase tracking-[0.12em] text-textsoft">Best Sellers This Month</p>
                        <div className="mt-3 space-y-2 text-sm">
                          {bestSellerRank.map((item, idx) => (
                            <div key={item.key} className="flex items-center justify-between rounded-lg border border-white/10 bg-base/60 px-3 py-2">
                              <span>{idx === 0 ? '🥇' : idx === 1 ? '🥈' : '🥉'} {item.name}</span>
                              <span className="text-gold">{currency(item.value)}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </section>

                  <section id="dash-wealth" className="space-y-4">
                    <h3 className="font-display text-3xl text-white">Building Your Future</h3>
                    <div className="grid gap-4 lg:grid-cols-2">
                      <div className="glass elev-card rounded-2xl p-5">
                        <p className="text-sm uppercase tracking-[0.12em] text-textsoft">Investment Portfolio</p>
                        <p className="mt-2 text-5xl font-bold text-gold">{currency(dashboardData.portfolioValue)}</p>
                        <p className="text-sm text-textsoft">Contribution {currency(dashboardData.monthlyContribution)}/month · Annualized return {(dashboardData.annualizedReturn * 100).toFixed(1)}%</p>
                        <p className="text-sm text-softgold">6 months consistent — keep going!</p>
                        <div className="mt-3 h-64">
                          <ResponsiveContainer width="100%" height="100%">
                            <AreaChart data={portfolioGrowthData}>
                              <CartesianGrid stroke="rgba(255,255,255,0.08)" />
                              <XAxis dataKey="month" stroke={chartPalette.axis} />
                              <YAxis stroke={chartPalette.axis} tickFormatter={(v) => `$${Math.round(v / 1000)}k`} />
                              <Tooltip formatter={(v) => currency(v)} />
                              <Area type="monotone" dataKey="actual" stroke={chartPalette.teal} fill="rgba(59,122,136,0.15)" />
                              <Line type="monotone" dataKey="projected" stroke={chartPalette.primary} strokeDasharray="6 4" dot={false} />
                            </AreaChart>
                          </ResponsiveContainer>
                        </div>
                      </div>
                      <div className="space-y-4">
                        <div className="glass rounded-2xl p-5">
                          <p className="text-sm uppercase tracking-[0.12em] text-textsoft">3-Year Wealth Projection</p>
                          <div className="mt-3 grid gap-3 md:grid-cols-3">
                            {[{ l: 'Month 12', v: milestone12 }, { l: 'Month 24', v: milestone24 }, { l: 'Month 36', v: milestone36 }].map((m) => (
                              <div key={m.l} className="rounded-lg border border-white/10 bg-base/70 p-3">
                                <p className="text-xs text-textsoft">{m.l}</p>
                                <AnimatedNumber value={m.v} className="text-2xl font-bold text-gold" />
                              </div>
                            ))}
                          </div>
                          <p className="mt-3 text-sm text-textsoft">Without investing: <span className="text-danger">$0</span> | With EverMore strategy: <span className="text-gold">{currency(milestone36)}</span></p>
                        </div>
                        <div className="glass rounded-2xl p-5">
                          <p className="text-sm uppercase tracking-[0.12em] text-textsoft">Revenue Diversification Progress</p>
                          <div className="mt-3 space-y-2">
                            {dashboardData.passiveStreams.map((item) => (
                              <button
                                key={item.id}
                                onClick={() => setDashboardData((prev) => ({ ...prev, passiveStreams: prev.passiveStreams.map((r) => r.id === item.id ? { ...r, active: !r.active } : r) }))}
                                className={`w-full rounded-lg border px-3 py-2 text-left ${item.active ? 'border-gold/45 bg-gold/10 text-softgold' : 'border-white/15 text-textsoft'}`}
                              >
                                <p>{item.active ? '☑' : '☐'} {item.name} — {item.status}</p>
                                <p className="text-xs">Estimated monthly revenue {currency(item.est)}</p>
                              </button>
                            ))}
                          </div>
                          <p className="mt-3 text-lg font-semibold text-gold">Monthly Passive Income: {currency(passiveIncomeTotal)}</p>
                        </div>
                      </div>
                    </div>
                  </section>

                  <section id="dash-health" className="space-y-4">
                    <h3 className="font-display text-3xl text-white">Your Financial Health Over Time</h3>
                    <div className="grid gap-4 lg:grid-cols-2">
                      <div className="glass elev-card rounded-2xl p-5">
                        <div className="flex flex-col items-start gap-4 md:flex-row md:items-center">
                          <Gauge score={dashboardData.healthScore} />
                          <div>
                            <p className="text-sm uppercase tracking-[0.12em] text-textsoft">Current Grade</p>
                            <p className="font-display text-6xl text-gold">
                              {dashboardData.healthScore >= 90 ? 'A' : dashboardData.healthScore >= 80 ? 'B' : dashboardData.healthScore >= 70 ? 'C' : dashboardData.healthScore >= 60 ? 'D' : 'F'}
                            </p>
                            <div className="mt-2 grid gap-1 text-sm text-textsoft">
                              <p>Legal Protection: {dashboardData.healthCategories.legalProtection}/20</p>
                              <p>Tax Efficiency: {dashboardData.healthCategories.taxEfficiency}/20</p>
                              <p>Cash Flow: {dashboardData.healthCategories.cashFlow}/20</p>
                              <p>Wealth Building: {dashboardData.healthCategories.wealthBuilding}/20</p>
                              <p>Revenue Diversification: {dashboardData.healthCategories.diversification}/20</p>
                            </div>
                          </div>
                        </div>
                        <div className="mt-4 h-64">
                          <ResponsiveContainer width="100%" height="100%">
                            <RadarChart data={healthRadarData}>
                              <PolarGrid stroke="rgba(255,255,255,0.2)" />
                              <PolarAngleAxis dataKey="subject" stroke={chartPalette.axis} />
                              <PolarRadiusAxis domain={[0, 20]} stroke={chartPalette.axis} />
                              <Radar dataKey="score" stroke={chartPalette.primary} fill={chartPalette.primary} fillOpacity={0.3} />
                            </RadarChart>
                          </ResponsiveContainer>
                        </div>
                      </div>

                      <div className="space-y-4">
                        <div className="glass rounded-2xl p-5">
                          <p className="text-sm uppercase tracking-[0.12em] text-textsoft">Score History</p>
                          <div className="mt-3 h-48">
                            <ResponsiveContainer width="100%" height="100%">
                              <LineChart data={dashboardData.healthHistory}>
                                <CartesianGrid stroke="rgba(255,255,255,0.08)" />
                                <XAxis dataKey="label" stroke={chartPalette.axis} />
                                <YAxis domain={[0, 100]} stroke={chartPalette.axis} />
                                <Tooltip />
                                <Line dataKey="score" stroke={chartPalette.primary} strokeWidth={3} />
                              </LineChart>
                            </ResponsiveContainer>
                          </div>
                        </div>
                        <div className="glass rounded-2xl p-5">
                          <p className="text-sm uppercase tracking-[0.12em] text-textsoft">Next Steps ({lowestHealthCategory})</p>
                          <div className="mt-3 space-y-2">
                            {nextSteps.map((step) => (
                              <label key={step} className="flex items-center gap-2 rounded-lg border border-white/10 bg-base/60 px-3 py-2 text-sm">
                                <input type="checkbox" checked={Boolean(taxActionChecks[step])} onChange={() => toggleActionItem(step)} />
                                <span>{step}</span>
                              </label>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>
                  </section>
                </div>
              </div>

              <div className="no-print fixed bottom-3 left-1/2 z-40 w-[95%] -translate-x-1/2 rounded-xl border border-gold/25 bg-base/90 p-2 backdrop-blur lg:hidden">
                <div className="grid grid-cols-9 gap-1">
                  {dashboardSectionItems.map((item) => (
                    <button key={item.id} onClick={() => scrollToSection(item.id)} className={`rounded-md px-1 py-2 text-[11px] ${activeDashboardSection === item.id ? 'bg-gold/20 text-gold' : 'text-textsoft'}`}>
                      <div>{item.icon}</div>
                    </button>
                  ))}
                </div>
              </div>

              <div className="no-print fixed bottom-5 right-5 z-50">
                <button
                  onClick={() => setChatOpen((v) => !v)}
                  className="relative grid h-14 w-14 place-items-center rounded-full bg-gold text-xl text-white shadow-glow"
                >
                  💬
                  <span className="absolute right-1 top-1 h-3 w-3 animate-pulse rounded-full bg-success" />
                  {chatUnread > 0 ? (
                    <span className="absolute -left-1 -top-1 grid h-5 w-5 place-items-center rounded-full bg-gold text-[10px] font-bold text-base">
                      {chatUnread}
                    </span>
                  ) : null}
                </button>
              </div>
              <AnimatePresence>
                {chatOpen ? (
                  <motion.div
                    initial={{ opacity: 0, y: 20 }}
                    animate={{ opacity: 1, y: 0 }}
                    exit={{ opacity: 0, y: 20 }}
                    className="no-print fixed bottom-24 right-5 z-50 h-[520px] w-[380px] rounded-2xl border border-gold/30 bg-surface/95 shadow-glow backdrop-blur"
                  >
                    <div className="flex items-center justify-between rounded-t-2xl border-b border-gold/30 bg-gold/20 px-4 py-3">
                      <div className="flex items-center gap-2">
                        <span className="grid h-8 w-8 place-items-center rounded-full bg-gold text-xs font-bold text-base">AJ</span>
                        <div>
                          <p className="text-sm font-semibold text-softgold">Aaron Joseph — Your Financial Advisor</p>
                        </div>
                        <span className="h-2 w-2 animate-pulse rounded-full bg-success" />
                      </div>
                      <button onClick={() => setChatOpen(false)} className="text-textsoft">✕</button>
                    </div>
                    <div className="h-[400px] space-y-3 overflow-y-auto p-3">
                      {chatMessages.map((msg, i) => (
                        <div key={`${msg.time}-${i}`} className={`rounded-xl border p-2 ${msg.from === 'Aaron' ? 'border-gold/25 bg-gold/10' : 'border-white/10 bg-base/60'}`}>
                          <p className="text-xs font-semibold text-softgold">{msg.from} <span className="text-textsoft">({msg.time})</span></p>
                          <p className="text-sm text-white">{msg.text}</p>
                        </div>
                      ))}
                      {chatTyping ? (
                        <div className="rounded-xl border border-gold/20 bg-gold/10 p-2">
                          <p className="text-xs text-softgold">Aaron is typing</p>
                          <div className="mt-1 flex gap-1">
                            <span className="h-2 w-2 animate-bounce rounded-full bg-softgold" />
                            <span className="h-2 w-2 animate-bounce rounded-full bg-softgold [animation-delay:120ms]" />
                            <span className="h-2 w-2 animate-bounce rounded-full bg-softgold [animation-delay:240ms]" />
                          </div>
                        </div>
                      ) : null}
                    </div>
                    <div className="flex gap-2 border-t border-white/10 p-3">
                      <input
                        value={chatInput}
                        onChange={(e) => setChatInput(e.target.value)}
                        onKeyDown={(e) => e.key === 'Enter' && sendChatMessage()}
                        placeholder="Message Aaron..."
                        className="w-full rounded-xl border border-white/10 bg-base px-3 py-2 text-sm text-white"
                      />
                      <button onClick={sendChatMessage} className="rounded-xl bg-gold px-3 py-2 text-sm font-semibold text-base">Send</button>
                    </div>
                  </motion.div>
                ) : null}
              </AnimatePresence>

              <AnimatePresence>
                {goalCelebration ? (
                  <motion.div className="no-print fixed inset-0 z-50 grid place-items-center bg-black/70" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                    <motion.div className="glass w-full max-w-md rounded-2xl p-6 text-center" initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }}>
                      <div className="text-5xl text-gold">🎉</div>
                      <p className="mt-3 font-display text-3xl text-gold">Goal Achieved!</p>
                      <p className="mt-2 text-textsoft">Congratulations Sarah — Aaron has been notified of your milestone.</p>
                      <button onClick={() => setGoalCelebration(false)} className="mt-4 rounded-xl bg-gold px-4 py-2 font-semibold text-base">Close</button>
                    </motion.div>
                  </motion.div>
                ) : null}
              </AnimatePresence>
            </section>

            <footer className="border-t border-white/10 px-4 py-8 text-center text-sm text-textsoft">
              EverMore & Company Client Portal · (312) 555-0192 · www.evermorefinancial.com
            </footer>
          </motion.div>
        );
      };

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
